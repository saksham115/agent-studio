version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent_studio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_studio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agent_studio_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent_studio_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/agent_studio
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-agent-studio-uploads}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      SARVAM_API_KEY: ${SARVAM_API_KEY:-}
      EXOTEL_API_KEY: ${EXOTEL_API_KEY:-}
      GUPSHUP_API_KEY: ${GUPSHUP_API_KEY:-}
      CORS_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
